<style>
  :root {
    --bg: #0f1108;
    --surface: #191c0e;
    --surface2: #1f2313;
    --border: #2e3318;
    --accent: #b8e04a;
    --accent2: #7dba1f;
    --muted: #5a6140;
    --text: #d8e4b0;
    --text-dim: #8a9870;
    --highlight: #b8e04a22;
    --highlight-border: #b8e04a55;
    --truck1: #4ab8e0;
    --truck2: #e09a4a;
    --truck3: #e04a8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 24px 32px 20px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .brand-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--accent);
  }

  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 42px;
    font-weight: 800;
    line-height: 1;
    color: #fff;
    letter-spacing: -.5px;
    text-transform: uppercase;
  }

  h1 span { color: var(--accent); }

  /* ── STATS BAR ── */
  .stats {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .stat-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── CONTROLS ── */
  .controls {
    padding: 20px 32px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 240px;
    max-width: 520px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 14px 10px 40px;
    outline: none;
    transition: border-color .15s;
  }

  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  .filter-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 5px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f1108;
  }

  .filter-btn.truck1 { --t: var(--truck1); }
  .filter-btn.truck1.active { background: var(--truck1); border-color: var(--truck1); }
  .filter-btn.truck2 { --t: var(--truck2); }
  .filter-btn.truck2.active { background: var(--truck2); border-color: var(--truck2); }
  .filter-btn.truck3 { --t: var(--truck3); }
  .filter-btn.truck3.active { background: var(--truck3); border-color: var(--truck3); }
  .filter-btn.truck1:hover { border-color: var(--truck1); color: var(--truck1); }
  .filter-btn.truck2:hover { border-color: var(--truck2); color: var(--truck2); }
  .filter-btn.truck3:hover { border-color: var(--truck3); color: var(--truck3); }

  #result-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    white-space: nowrap;
  }

  /* ── TABLE WRAPPER ── */
  .table-wrap {
    overflow-x: auto;
    padding: 24px 32px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead tr {
    border-bottom: 2px solid var(--accent);
  }

  th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    padding: 8px 12px;
    text-align: left;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    position: relative;
  }

  th:hover { color: #fff; }

  th .sort-arrow {
    display: inline-block;
    margin-left: 4px;
    opacity: .35;
    font-size: 9px;
  }

  th.sort-asc .sort-arrow::after { content: '▲'; opacity: 1; }
  th.sort-desc .sort-arrow::after { content: '▼'; opacity: 1; }
  th:not(.sort-asc):not(.sort-desc) .sort-arrow::after { content: '⇅'; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }

  tbody tr:hover { background: var(--highlight); }

  tbody tr.hidden { display: none; }

  td {
    padding: 10px 12px;
    vertical-align: top;
    line-height: 1.4;
  }

  /* column specific */
  .col-truck { white-space: nowrap; }

  .truck-badge {
    display: inline-block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1.5px solid;
  }

  .truck-1 { color: var(--truck1); border-color: var(--truck1); background: #4ab8e011; }
  .truck-2 { color: var(--truck2); border-color: var(--truck2); background: #e09a4a11; }
  .truck-3 { color: var(--truck3); border-color: var(--truck3); background: #e04a8a11; }

  .col-order { font-family: 'DM Mono', monospace; color: var(--accent); font-size: 12px; }
  .col-name { font-weight: 500; color: #fff; }
  .col-bags {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    text-align: right;
  }

  .col-time {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .col-addr { color: var(--text-dim); max-width: 200px; }
  .col-email { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); max-width: 180px; word-break: break-all; }
  .col-comment { color: var(--text-dim); max-width: 280px; font-size: 12px; }
  .col-run { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-align: center; }

  .comment-text {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    cursor: pointer;
  }

  .comment-text.expanded {
    display: block;
    -webkit-line-clamp: unset;
  }

  mark {
    background: var(--accent);
    color: #0f1108;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ── NO RESULTS ── */
  .no-results {
    text-align: center;
    padding: 60px 0;
    display: none;
  }

  .no-results.show { display: block; }

  .no-results-icon { font-size: 40px; margin-bottom: 12px; }

  .no-results p {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 16px 32px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .1em;
    text-transform: uppercase;
  }

  @media (max-width: 600px) {
    header, .controls, .table-wrap { padding-left: 16px; padding-right: 16px; }
    h1 { font-size: 30px; }
  }
</style>
</head>

const tbody = document.getElementById('tbody');
const searchInput = document.getElementById('search');
const noResults = document.getElementById('no-results');
const resultCount = document.getElementById('result-count');
const filterBtns = document.querySelectorAll('.filter-btn');

let currentTruck = 'all';
let currentSearch = '';
let sortCol = null;
let sortDir = 1;

// Compute totals
const totalBags = orders.reduce((s, o) => s + o[11], 0);
document.getElementById('stat-bags').textContent = totalBags.toLocaleString();
document.getElementById('stat-orders').textContent = orders.length;
document.getElementById('footer-count').textContent = `${orders.length} orders · ${totalBags.toLocaleString()} bags`;

function truckClass(truck) {
  if (truck === 'Truck 1') return 'truck-1';
  if (truck === 'Truck 2') return 'truck-2';
  return 'truck-3';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, query) {
  if (!query) return escHtml(text);
  const safe = escHtml(text);
  const safeQ = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return safe.replace(new RegExp(`(${safeQ})`, 'gi'), '<mark>$1</mark>');
}

function buildRows() {
  const rows = [];
  orders.forEach((o, i) => {
    const [truck, runTruck, runNum, time, orderId, last, first, addr, city, email, comment, bags] = o;
    const fullName = `${first} ${last}`;
    const fullAddr = `${addr}, ${city}`;
    const searchFields = [truck, String(runNum), time, String(orderId), last, first, fullName, addr, city, email, comment].join(' ').toLowerCase();

    const tr = document.createElement('tr');
    tr.dataset.truck = truck;
    tr.dataset.search = searchFields;
    tr.dataset.idx = i;

    tr.innerHTML = `
      <td class="col-truck"><span class="truck-badge ${truckClass(truck)}">${escHtml(truck)}</span></td>
      <td class="col-run">${runNum}</td>
      <td class="col-time">${escHtml(time)}</td>
      <td class="col-order">#${orderId}</td>
      <td class="col-name">${highlight(fullName, currentSearch)}</td>
      <td class="col-bags">${bags}</td>
      <td class="col-addr">${highlight(fullAddr, currentSearch)}</td>
      <td class="col-email">${highlight(email, currentSearch)}</td>
      <td class="col-comment"><div class="comment-text">${highlight(comment || '—', currentSearch)}</div></td>
    `;

    // expand comment on click
    tr.querySelector('.comment-text').addEventListener('click', function() {
      this.classList.toggle('expanded');
    });

    rows.push(tr);
    tbody.appendChild(tr);
  });
  return rows;
}

let allRows = buildRows();

function applyFilters() {
  const q = currentSearch.toLowerCase().trim();
  let visible = 0;

  allRows.forEach(tr => {
    const truckMatch = currentTruck === 'all' || tr.dataset.truck === currentTruck;
    const searchMatch = !q || tr.dataset.search.includes(q);
    const show = truckMatch && searchMatch;
    tr.classList.toggle('hidden', !show);
    if (show) visible++;
  });

  // Re-highlight
  if (q) {
    allRows.forEach(tr => {
      if (tr.classList.contains('hidden')) return;
      const o = orders[tr.dataset.idx];
      const [truck,,runNum,time,orderId,last,first,addr,city,email,comment,bags] = o;
      const fullName = `${first} ${last}`;
      const fullAddr = `${addr}, ${city}`;
      tr.querySelector('.col-name').innerHTML = highlight(fullName, currentSearch);
      tr.querySelector('.col-addr').innerHTML = highlight(fullAddr, currentSearch);
      tr.querySelector('.col-email').innerHTML = highlight(email, currentSearch);
      tr.querySelector('.comment-text').innerHTML = highlight(comment || '—', currentSearch);
    });
  } else {
    allRows.forEach(tr => {
      const o = orders[tr.dataset.idx];
      const [,,,,orderId,last,first,addr,city,email,comment,bags] = o;
      const fullName = `${first} ${last}`;
      const fullAddr = `${addr}, ${city}`;
      tr.querySelector('.col-name').textContent = fullName;
      tr.querySelector('.col-addr').textContent = fullAddr;
      tr.querySelector('.col-email').textContent = email;
      tr.querySelector('.comment-text').textContent = comment || '—';
    });
  }

  noResults.classList.toggle('show', visible === 0);
  resultCount.textContent = `${visible} of ${orders.length} orders`;
}

searchInput.addEventListener('input', e => {
  currentSearch = e.target.value;
  applyFilters();
});

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTruck = btn.dataset.truck;
    applyFilters();
  });
});

// Sorting
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    const colMap = { truck: 0, run: 2, time: 3, order: 4, name: 6, bags: 11, address: 7, email: 9 };
    const idx = colMap[col];
    if (idx === undefined) return;

    if (sortCol === col) {
      sortDir *= -1;
    } else {
      sortCol = col;
      sortDir = 1;
    }

    document.querySelectorAll('th').forEach(t => t.classList.remove('sort-asc','sort-desc'));
    th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');

    const sorted = [...orders.map((o, i) => i)].sort((a, b) => {
      let va = orders[a][idx];
      let vb = orders[b][idx];
      if (col === 'name') { va = `${orders[a][6]} ${orders[a][5]}`; vb = `${orders[b][6]} ${orders[b][5]}`; }
      if (typeof va === 'number') return (va - vb) * sortDir;
      return String(va).localeCompare(String(vb)) * sortDir;
    });

    sorted.forEach(i => tbody.appendChild(allRows[i]));
    allRows = sorted.map(i => allRows.findIndex(r => parseInt(r.dataset.idx) === i)).map(i => allRows[i]);
    // re-index
    allRows = sorted.map(i => {
      const r = tbody.querySelectorAll('tr')[sorted.indexOf(i)];
      return r;
    });
    allRows = Array.from(tbody.querySelectorAll('tr'));
    applyFilters();
  });
});

// initial count
resultCount.textContent = `${orders.length} of ${orders.length} orders`;
</script>
</body>
</html>
